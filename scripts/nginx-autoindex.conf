# Minimal nginx site config for serving the flat APT repo over HTTP.
# Bind-mounted into the nginx container at /etc/nginx/conf.d/default.conf by serve.sh.
#
# packages-out/ is mounted at /usr/share/nginx/html/vyos, so the repo is reachable
# at  http://<host>/vyos/  — matching the router's sources.list base URL.
#
# autoindex is purely for human browsing; apt fetches explicit paths and never
# needs it. Do NOT enable gzip_static or on-the-fly gzip here: Packages.gz must be
# served verbatim, not re-encoded or transparently decompressed, or apt's index
# fetch breaks.
server {
    listen 80 default_server;
    root /usr/share/nginx/html;

    location / {
        autoindex on;
    }
}
